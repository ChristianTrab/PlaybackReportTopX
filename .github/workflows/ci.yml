name: CI

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.PlaybackReportingTopX.sln

      - name: Check formatting
        run: dotnet format Jellyfin.Plugin.PlaybackReportingTopX.sln --verify-no-changes

      - name: Build (strict — catches deprecated APIs, unused vars, naming violations)
        run: dotnet build Jellyfin.Plugin.PlaybackReportingTopX.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Run unit tests
        run: dotnet test Jellyfin.Plugin.PlaybackReportingTopX.Tests/Jellyfin.Plugin.PlaybackReportingTopX.Tests.csproj --configuration Release --no-build
